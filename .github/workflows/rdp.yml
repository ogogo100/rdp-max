name: RDP

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360  # 6 часов - МАКСИМУМ
    
    steps:
    - name: Установка пароля администратора
      run: net user runneradmin RdpPass2026
    
    - name: Включение RDP и открытие порта
      run: |
        # Включение RDP
        Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
        # Открытие порта в фаерволе
        netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
        # Запуск службы RDP
        Start-Service TermService
    
    - name: Скачивание ngrok
      run: |
        Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
        Expand-Archive ngrok.zip -DestinationPath ngrok
        Remove-Item ngrok.zip
    
    - name: Запуск ngrok туннеля
      run: |
        cd ngrok
        Start-Process .\ngrok.exe -ArgumentList "tcp 3389" -WindowStyle Hidden
        Start-Sleep -Seconds 10
    
    - name: Показать данные подключения
      run: |
        $ip = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing).Content
        Write-Host ""
        Write-Host "╔══════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
        Write-Host "║              МАКСИМАЛЬНЫЙ RDP ДОСТУП                         ║" -ForegroundColor Green
        Write-Host "╚══════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
        Write-Host ""
        Write-Host "  🔗 ПРЯМОЙ RDP:" -ForegroundColor Yellow
        Write-Host "     IP:      $ip" -ForegroundColor White
        Write-Host "     ПОРТ:    3389" -ForegroundColor White
        Write-Host "     ПОЛЬЗОВАТЕЛЬ: runneradmin" -ForegroundColor White
        Write-Host "     ПАРОЛЬ:      RdpPass2026" -ForegroundColor White
        Write-Host ""
        Write-Host "  🌐 NGROK АДРЕС (если прямой RDP не работает):" -ForegroundColor Yellow
        Write-Host "     Смотрите в логе выше строки 'Forwarding'" -ForegroundColor White
        Write-Host ""
        Write-Host "  ⏱️  ВРЕМЯ: 6 часов (максимум)" -ForegroundColor Green
        Write-Host "  💻 РЕСУРСЫ: 2 vCPU, 7 GB RAM" -ForegroundColor Green
        Write-Host "  👑 ПРАВА: Администратор" -ForegroundColor Green
        Write-Host ""
        Write-Host "  ⚡ ПОДКЛЮЧЕНИЕ:" -ForegroundColor Cyan
        Write-Host "     mstsc /v:$ip" -ForegroundColor White
        Write-Host "     (логин и пароль выше)" -ForegroundColor White
        Write-Host "╔══════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
    
    - name: МАКСИМАЛЬНОЕ ВРЕМЯ (6 часов)
      run: Start-Sleep -Seconds 21600
