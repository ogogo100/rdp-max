name: RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
    - name: Установка пароля
      run: net user runneradmin RdpPass2026
    
    - name: Включение RDP
      run: |
        Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
        netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
        Start-Service TermService
    
    - name: Скачать ngrok
      run: |
        Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
        Expand-Archive ngrok.zip -DestinationPath ngrok
        Remove-Item ngrok.zip
    
    - name: Запустить ngrok с выводом
      run: |
        cd ngrok
        .\ngrok.exe tcp 3389 --log=stdout &
        Start-Sleep -Seconds 10
    
    - name: Показать адрес
      run: |
        $ip = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing).Content
        Write-Host ""
        Write-Host "=====================================================" -ForegroundColor Green
        Write-Host "  RDP CONNECTION INFO" -ForegroundColor Cyan
        Write-Host "=====================================================" -ForegroundColor Green
        Write-Host "  DIRECT RDP IP: $ip:3389 (probably blocked)" -ForegroundColor Yellow
        Write-Host "  USER: runneradmin" -ForegroundColor Yellow
        Write-Host "  PASSWORD: RdpPass2026" -ForegroundColor Yellow
        Write-Host "=====================================================" -ForegroundColor Green
        Write-Host ""
        Write-Host "  LOOK ABOVE in the log for ngrok address:" -ForegroundColor Cyan
        Write-Host "  Find line: Forwarding: tcp://0.tcp.ngrok.io:PORT" -ForegroundColor White
        Write-Host "  Connect: mstsc /v:0.tcp.ngrok.io:PORT" -ForegroundColor White
        Write-Host "=====================================================" -ForegroundColor Green
    
    - name: Keep alive
      run: Start-Sleep -Seconds 21600
