name: RDP

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
    - name: Установка пароля
      run: net user runneradmin RdpPass2026
    
    - name: Включение RDP
      run: |
        Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
        netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
        Start-Service TermService
    
    - name: Скачать bore
      run: |
        Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
        Expand-Archive bore.zip -DestinationPath bore
        Remove-Item bore.zip
    
    - name: Запустить bore туннель
      run: |
        cd bore
        .\bore.exe local 3389 --to bore.pub | ForEach-Object {
          if ($_ -match "tcp://bore.pub:(\d+)") {
            Write-Host ""
            Write-Host "=====================================================" -ForegroundColor Green
            Write-Host "RDP ПОДКЛЮЧЕНИЕ:" -ForegroundColor Cyan
            Write-Host "Адрес: bore.pub:$($matches[1])" -ForegroundColor Yellow
            Write-Host "Пользователь: runneradmin" -ForegroundColor Yellow
            Write-Host "Пароль: RdpPass2026" -ForegroundColor Yellow
            Write-Host "=====================================================" -ForegroundColor Green
            Write-Host "Команда: mstsc /v:bore.pub:$($matches[1])" -ForegroundColor White
            Write-Host "=====================================================" -ForegroundColor Green
          }
          Write-Output $_
        }
        Start-Sleep -Seconds 10
    
    - name: Информация
      run: |
        $ip = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing).Content
        Write-Host ""
        Write-Host "=====================================================" -ForegroundColor Cyan
        Write-Host "        RDP АКТИВЕН - 6 ЧАСОВ" -ForegroundColor Green
        Write-Host "=====================================================" -ForegroundColor Cyan
        Write-Host "Прямой RDP (может не работать):" -ForegroundColor Yellow
        Write-Host "  IP: $ip" -ForegroundColor White
        Write-Host "  User: runneradmin" -ForegroundColor White
        Write-Host "  Pass: RdpPass2026" -ForegroundColor White
        Write-Host ""
        Write-Host "BORE ТУННЕЛЬ (РАБОТАЕТ ВСЕГДА):" -ForegroundColor Green
        Write-Host "  Адрес: bore.pub:ПОРТ (смотрите выше в логе)" -ForegroundColor White
        Write-Host "=====================================================" -ForegroundColor Cyan
    
    - name: Держать активным
      run: Start-Sleep -Seconds 21600
