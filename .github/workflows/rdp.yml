name: RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Set RDP password
        run: net user runneradmin RdpPass2026

      - name: Enable RDP
        run: |
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Start-Service TermService

      - name: Download AnyDesk
        run: |
          curl -L -o AnyDesk.exe https://download.anydesk.com/AnyDesk.exe

      - name: Start AnyDesk
        run: |
          Start-Process -FilePath ".\AnyDesk.exe" -WindowStyle Normal
          Start-Sleep -Seconds 5
          Write-Host "AnyDesk запущен, адрес появится в окне"

      - name: Keep build alive
        run: Start-Sleep -Seconds 21600
