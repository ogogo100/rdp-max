name: RDP Direct

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Set password
      run: net user runneradmin RdpPass2026

    - name: Enable RDP on port 13389
      run: |
        # Включить RDP
        Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
        
        # Сменить порт на 13389
        Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "PortNumber" -Value 13389
        
        # Открыть порт в фаерволе
        netsh advfirewall firewall add rule name="RDP-Alt" dir=in action=allow protocol=TCP localport=13389
        
        # Принудительно остановить RDP службу (без подтверждения)
        Stop-Service TermService -Force
        
        # Запустить заново
        Start-Service TermService
        
        # Проверить порт
        netstat -an | findstr :13389

    - name: Show IP
      run: |
        $ip = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing).Content
        Write-Host ""
        Write-Host "=====================================================" -ForegroundColor Green
        Write-Host "  RDP CONNECT: mstsc /v:$ip:13389" -ForegroundColor Yellow
        Write-Host "  USER: runneradmin" -ForegroundColor Yellow
        Write-Host "  PASS: RdpPass2026" -ForegroundColor Yellow
        Write-Host "=====================================================" -ForegroundColor Green

    - name: Keep alive
      run: Start-Sleep -Seconds 21600
