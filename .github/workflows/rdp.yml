name: RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Set password
      run: net user runneradmin RdpPass2026

    - name: Enable RDP
      run: |
        Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
        netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
        Start-Service TermService

    - name: Download bore
      run: |
        curl -L -o bore.zip https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-pc-windows-msvc.zip
        tar -xf bore.zip
        del bore.zip

    - name: Run bore with auto-reconnect
      run: |
        while ($true) {
          Write-Host "Starting bore tunnel..."
          $process = Start-Process -NoNewWindow -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput "bore.log" -PassThru
          Start-Sleep -Seconds 10
          Get-Content "bore.log" -Tail 5
          while (-not $process.HasExited) {
            Start-Sleep -Seconds 30
            Write-Host "Bore tunnel active..." -ForegroundColor Green
          }
          Write-Host "Bore exited, restarting..." -ForegroundColor Red
          Start-Sleep -Seconds 5
        }
